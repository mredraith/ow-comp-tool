<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>Overwatch Composition Tool</title>
		<style>
    body { font-family: Arial, sans-serif; margin: 0; background:#121212; color:white; }
    header { padding:20px; text-align:center; background:#1f1f1f; font-size:28px; font-weight:bold; }
    .container { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px; }
    .panel { background:#1c1c1c; border-radius:12px; padding:20px; }
    .hero-grid { display:flex; flex-wrap:wrap; gap:10px; }
    .hero-card { width:110px; cursor:pointer; text-align:center; background:#2a2a2a; border-radius:10px; padding:10px; }
    .hero-card img { width:64px; height:64px; object-fit:cover; }
    .tag { display:inline-block; margin:4px; padding:4px 8px; border-radius:999px; font-size:12px; }
    .Brawl { background:#c96b2c; }
    .Dive { background:#2c78c9; }
    .Poke { background:#2ca35a; }
    button { padding:8px 14px; border:none; border-radius:8px; cursor:pointer; }
	.compat-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .compat-card{ width:80px; text-align:center; background:#2a2a2a; border-radius:8px; padding:6px; }
	.compat-card img{ width:50px; height:50px; object-fit:cover; }
#displayToggle{
  margin-bottom:15px;
  background:#444;
  color:white;
}

.matchup-guide{
  font-size:1.5rem;
}

#teamSelect1,
#teamSelect2{
  max-height:300px;
  overflow-y:auto;
  margin-bottom:15px;
  padding-right:6px;
}

#teamSelect1 button,
#teamSelect2 button{
  margin:4px;
}

.analyze-btn{
  background: #ffffff;
  color: black;
  font-weight: bold;
  margin-bottom: 15px;
}
.team-analyzers{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  margin-top:20px;
}

.full-width{
  grid-column:1 / -1;
}
}
  gap:20px;
  margin-top:20px;
}

.team-box{
  background:#252525;
  padding:15px;
  border-radius:12px;
}

.selected{
  outline:4px solid white;
  transform:scale(1.05);
}
  </style>
	</head>
	<body>
		<header>Overwatch Composition Tool</header>
		<div class="container">
			<div class="panel">
<h2>Hero Lookup</h2>

<select id="sortMode" onchange="renderHeroes()" style="
  margin-bottom:15px;
  padding:8px;
  border-radius:8px;
  font-size:16px;
">
  <option value="role">Sort by Role</option>
  <option value="comp">Sort by Composition</option>
</select>

<div id="heroGrid" class="hero-grid"></div>
			</div>
			<div class="panel">
				<h2>Hero Details</h2>
				<button id="displayToggle" onclick="toggleDisplayMode()">
    Show Images
  </button>
				<div id="heroDetails">Select a hero</div>
			</div>
<div class="panel full-width">
    <h2>Matchup Analyzer</h2>

    <div class="matchup-guide">
        <div><span class="Poke">Poke</span> outranges <span class="Brawl">Brawl</span></div>
        <div><span class="Brawl">Brawl</span> defends against <span class="Dive">Dive</span></div>
        <div><span class="Dive">Dive</span> overwhelms <span class="Poke">Poke</span></div>
    </div>

    <div class="team-analyzers">

        <div class="team-box">
            <h3>Team 1</h3>
            <div id="teamSelect1"></div>
            <button class="analyze-btn" onclick="analyzeMatchup()">Analyze</button>
            <div id="teamResults1"></div>
        </div>

        <div class="team-box">
            <h3>Team 2</h3>
            <div id="teamSelect2"></div>
            <div id="teamResults2"></div>
        </div>

    </div>

    <div id="matchupResult" style="
        margin-top:20px;
        font-size:1.4rem;
        font-weight:bold;
    "></div>
</div>
		</div>
		<script>
const HEROES = [
  { name:'Domina', role:'Tank', categories:['Poke'], image:'images/Domina.png' },
  { name:'Doomfist', role:'Tank', categories:['Dive'], image:'images/Doomfist.png' },
  { name:'Dva', role:'Tank', categories:['Dive'], image:'images/Dva.png' },
  { name:'Hamston', role:'Tank', categories:['Dive'], image:'images/Hamston.png' },
  { name:'Hazard', role:'Tank', categories:['Brawl','Dive'], image:'images/Hazard.png' },
  { name:'Junkerqueen', role:'Tank', categories:['Brawl'], image:'images/Junkerqueen.png' },
  { name:'Mauga', role:'Tank', categories:['Brawl','Poke'], image:'images/Mauga.png' },
  { name:'Orisa', role:'Tank', categories:['Brawl','Poke'], image:'images/Orisa.png' },
  { name:'Ramattra', role:'Tank', categories:['Brawl','Poke'], image:'images/Ramattra.png' },
  { name:'Reinhardt', role:'Tank', categories:['Brawl'], image:'images/Reinhardt.png' },
  { name:'Roadhog', role:'Tank', categories:['Brawl','Poke'], image:'images/Roadhog.png' },
  { name:'Sigma', role:'Tank', categories:['Poke'], image:'images/Sigma.png' },
  { name:'Winston', role:'Tank', categories:['Dive'], image:'images/Winston.png' },
  { name:'Zarya', role:'Tank', categories:['Brawl'], image:'images/Zarya.png' },

  { name:'Anran', role:'Damage', categories:['Dive'], image:'images/Anran.png' },
  { name:'Ashe', role:'Damage', categories:['Poke'], image:'images/Ashe.png' },
  { name:'Bastion', role:'Damage', categories:['Brawl'], image:'images/Bastion.png' },
  { name:'Cowboy', role:'Damage', categories:['Brawl','Dive'], image:'images/Cowboy.png' },
  { name:'Echo', role:'Damage', categories:['Dive'], image:'images/Echo.png' },
  { name:'Emre', role:'Damage', categories:['Brawl'], image:'images/Emre.png' },
  { name:'Freja', role:'Damage', categories:['Dive','Poke'], image:'images/Freja.png' },
  { name:'Hanzo', role:'Damage', categories:['Poke'], image:'images/Hanzo.png' },
  { name:'Genji', role:'Damage', categories:['Dive'], image:'images/Genji.png' },
  { name:'Junkrat', role:'Damage', categories:['Brawl'], image:'images/Junkrat.png' },
  { name:'Mei', role:'Damage', categories:['Brawl','Poke'], image:'images/Mei.png' },
  { name:'Pharah', role:'Damage', categories:['Dive','Poke'], image:'images/Pharah.png' },
  { name:'Reaper', role:'Damage', categories:['Brawl','Dive'], image:'images/Reaper.png' },
  { name:'Sierra', role:'Damage', categories:['Brawl','Dive','Poke'], image:'images/Sierra.png' },
  { name:'Sojourn', role:'Damage', categories:['Dive','Poke'], image:'images/Sojourn.png' },
  { name:'Soldier76', role:'Damage', categories:['Brawl','Poke'], image:'images/Soldier76.png' },
  { name:'Sombra', role:'Damage', categories:['Dive'], image:'images/Sombra.png' },
  { name:'Symmetra', role:'Damage', categories:['Brawl'], image:'images/Symmetra.png' },
  { name:'Torbjorn', role:'Damage', categories:['Brawl','Poke'], image:'images/Torbjorn.png' },
  { name:'Tracer', role:'Damage', categories:['Dive'], image:'images/Tracer.png' },
  { name:'Vendetta', role:'Damage', categories:['Brawl','Dive'], image:'images/Vendetta.png' },
  { name:'Venture', role:'Damage', categories:['Brawl','Dive'], image:'images/Venture.png' },
  { name:'Widowmaker', role:'Damage', categories:['Poke'], image:'images/Widowmaker.png' },

  { name:'Ana', role:'Support', categories:['Brawl','Dive','Poke'], image:'images/Ana.png' },
  { name:'Baptiste', role:'Support', categories:['Brawl','Poke'], image:'images/Baptiste.png' },
  { name:'Brigitte', role:'Support', categories:['Dive'], image:'images/Brigitte.png' },
  { name:'Illari', role:'Support', categories:['Poke'], image:'images/Illari.png' },
  { name:'Jetpackcat', role:'Support', categories:['Brawl','Dive'], image:'images/Jetpackcat.png' },
  { name:'Juno', role:'Support', categories:['Brawl','Dive','Poke'], image:'images/Juno.png' },
  { name:'Kiriko', role:'Support', categories:['Brawl','Dive','Poke'], image:'images/Kiriko.png' },
  { name:'Lifeweaver', role:'Support', categories:['Brawl','Poke'], image:'images/Lifeweaver.png' },
  { name:'Lucio', role:'Support', categories:['Brawl','Dive'], image:'images/Lucio.png' },
  { name:'Mercy', role:'Support', categories:['Dive','Poke'], image:'images/Mercy.png' },
  { name:'Mizuki', role:'Support', categories:['Brawl','Dive'], image:'images/Mizuki.png' },
  { name:'Moira', role:'Support', categories:['Brawl','Dive'], image:'images/Moira.png' },
  { name:'Zenyatta', role:'Support', categories:['Poke'], image:'images/Zenyatta.png' },
  { name:'Wuyang', role:'Support', categories:['Brawl','Dive','Poke'], image:'images/Wuyang.png' },
]

let selectedTeam1 = [];
let selectedTeam2 = [];

let showImages = false;
let currentHero = null;

function toggleDisplayMode(){
  showImages = !showImages;

  document.getElementById('displayToggle').textContent =
    showImages ? 'Show Names' : 'Show Images';

  if(currentHero){
    selectHero(currentHero);
  }
}

function renderCompatList(list){
  if(list.length === 0) return 'None';

  if(!showImages){
    return list.map(h => h.name).join(', ');
  }

  return `
    <div class="compat-grid">
      ${list.map(h => `
        <div class="compat-card">
					<img src="${h.image}" alt="${h.name}">
						<div>${h.name}</div>
					</div>
      `).join('')}
    </div>
  `;
}

function renderHeroes(){
  const grid = document.getElementById('heroGrid');
  const mode = document.getElementById('sortMode').value;

  let sections =
    mode === "role"
      ? ["Tank","Damage","Support"]
      : ["Brawl","Dive","Poke"];

  grid.innerHTML = sections.map(section => {

    const heroesInSection =
      mode === "role"
        ? HEROES.filter(hero => hero.role === section)
        : HEROES.filter(hero => hero.categories.includes(section));

    return `
      <h3 style="
        width:100%;
        margin:20px 0 10px;
        border-bottom:1px solid #444;
        padding-bottom:8px;
      ">
        ${section}
      </h3>

      ${heroesInSection.map(hero => `
        <div class="hero-card" onclick="selectHero('${hero.name}')">
          <img src="${hero.image}" alt="${hero.name}">
          <div>${hero.name}</div>
        </div>
      `).join('')}
    `;
  }).join('');

  document.getElementById("teamSelect1").innerHTML =
    makeButtons(1, selectedTeam1);

  document.getElementById("teamSelect2").innerHTML =
    makeButtons(2, selectedTeam2);
}

function makeButtons(teamNum, selected){
  return HEROES.map(hero => {
    let colour = "#666";

    if(hero.role === "Tank") colour = "#ff9f43";
    if(hero.role === "Damage") colour = "#4da6ff";
    if(hero.role === "Support") colour = "#4cd137";

    const selectedClass = selected.includes(hero.name)
      ? "selected"
      : "";

    return `
      <button
        class="${selectedClass}"
        onclick="toggleTeam('${hero.name}', ${teamNum})"
        style="
          background:${colour};
          color:white;
          margin:4px;
          font-weight:bold;
        "
      >
        ${hero.name}
      </button>
    `;
  }).join('');
}

function toggleTeam(name, teamNum){
  const team = teamNum === 1 ? selectedTeam1 : selectedTeam2;

  const index = team.indexOf(name);

  if(index >= 0){
    team.splice(index,1);
  } else if(team.length < 6){
    team.push(name);
  }

  renderHeroes();
}

function getDominant(team){
  const score = {
    Brawl:0,
    Dive:0,
    Poke:0
  };

  team.forEach(name=>{
    const hero = HEROES.find(h=>h.name===name);
    hero.categories.forEach(cat=>score[cat]++);
  });

  const dominant = Object.keys(score).reduce((a,b)=>
    score[a] > score[b] ? a : b
  );

  return {score, dominant};
}

function analyzeMatchup(){
  const team1 = getDominant(selectedTeam1);
  const team2 = getDominant(selectedTeam2);

  function colourHeroes(team){
    return team.map(name=>{
      const hero = HEROES.find(h=>h.name===name);

      let colour = "#fff";
      if(hero.role==="Tank") colour = "#ff9f43";
      if(hero.role==="Damage") colour = "#4da6ff";
      if(hero.role==="Support") colour = "#4cd137";

      return `<span style="color:${colour}; font-weight:bold;">${hero.name}</span>`;
    }).join(", ");
  }

  document.getElementById("teamResults1").innerHTML = `
    <p><strong>Selected:</strong> ${colourHeroes(selectedTeam1)}</p>
    <p>Brawl: ${team1.score.Brawl}</p>
    <p>Dive: ${team1.score.Dive}</p>
    <p>Poke: ${team1.score.Poke}</p>
    <h3>Dominant Style: ${team1.dominant}</h3>
  `;

  document.getElementById("teamResults2").innerHTML = `
    <p><strong>Selected:</strong> ${colourHeroes(selectedTeam2)}</p>
    <p>Brawl: ${team2.score.Brawl}</p>
    <p>Dive: ${team2.score.Dive}</p>
    <p>Poke: ${team2.score.Poke}</p>
    <h3>Dominant Style: ${team2.dominant}</h3>
  `;

  let result = "Even matchup";

  if(
    (team1.dominant==="Dive" && team2.dominant==="Poke") ||
    (team1.dominant==="Poke" && team2.dominant==="Brawl") ||
    (team1.dominant==="Brawl" && team2.dominant==="Dive")
  ){
    result = "Team 1 has advantage";
  }
  else if(
    (team2.dominant==="Dive" && team1.dominant==="Poke") ||
    (team2.dominant==="Poke" && team1.dominant==="Brawl") ||
    (team2.dominant==="Brawl" && team1.dominant==="Dive")
  ){
    result = "Team 2 has advantage";
  }

  document.getElementById("matchupResult").innerHTML = result;
}

renderHeroes();
</script>
				</body>
			</html>
